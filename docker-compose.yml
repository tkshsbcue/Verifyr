# Verifyr — one-command run.
#
#   cp .env.example .env      # set OPENAI_API_KEY (+ JWT_SECRET, ADMIN_*)
#   docker compose up --build
#   open http://localhost:8000
#
# The app container is self-contained (SQLite on a named volume, built frontend
# served at /). It still needs an Appium + Android emulator to drive apps:
#   • macOS / Windows: run the emulator + Appium on your host; the default
#     APPIUM_SERVER_URL=http://host.docker.internal:4723 reaches it.
#   • Linux with /dev/kvm: bring up the bundled emulator too:
#       docker compose --profile emulator up --build
#     and set APPIUM_SERVER_URL=http://emulator:4723 in .env.

services:
  app:
    build: .
    env_file: [.env]
    environment:
      # Self-contained persistence on the named volume (no external DB needed).
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/verifyr.db}
      RUNS_DIR: /data/runs
      UPLOAD_DIR: /data/uploads
      JWT_SECRET: ${JWT_SECRET:-change-me-please-set-a-32-byte-secret}
      APPIUM_SERVER_URL: ${APPIUM_SERVER_URL:-http://host.docker.internal:4723}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      # The container can't launch a host emulator; let Appium's host manage it.
      AUTO_START_EMULATOR: ${AUTO_START_EMULATOR:-false}
      # If both set, an admin user is created on first boot.
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets Linux reach a host-run Appium
    ports:
      - "8000:8000"
    volumes:
      - verifyr-data:/data
    restart: unless-stopped

  # Optional: a full Android emulator + Appium in a container.
  # Requires a Linux host with /dev/kvm. Enable with: --profile emulator
  emulator:
    profiles: ["emulator"]
    image: budtmo/docker-android:emulator_13.0
    privileged: true
    devices:
      - /dev/kvm
    environment:
      EMULATOR_DEVICE: "Samsung Galaxy S10"
      WEB_VNC: "true"      # watch the screen at http://localhost:6080
      APPIUM: "true"       # Appium server on 4723
    ports:
      - "4723:4723"
      - "6080:6080"
    restart: unless-stopped

volumes:
  verifyr-data:
